version: '3.9'

services:
  backend:
    build: ./backend
    container_name: closecheck-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # hot reload
      - uploads_data:/app/uploads
      - reports_data:/app/reports
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: sqlite:///./closecheck.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: closecheck-ui
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src  # hot reload
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads_data:
  reports_data:
