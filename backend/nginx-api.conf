# nginx site config for api.closecheck.example
# Copy to: /etc/nginx/sites-available/api.closecheck.example
# Then: ln -s /etc/nginx/sites-available/api.closecheck.example /etc/nginx/sites-enabled/

server {
    listen 443 ssl http2;
    server_name api.closecheck.example;

    # TLS certificates (via Certbot)
    ssl_certificate /etc/letsencrypt/live/api.closecheck.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.closecheck.example/privkey.pem;

    # CORS headers for frontend origin
    add_header Access-Control-Allow-Origin "https://app.closecheck.example" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, X-API-Key, Authorization, X-Device-Token" always;

    # Handle OPTIONS (preflight) requests
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # Proxy to backend uvicorn
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name api.closecheck.example;
    return 301 https://$server_name$request_uri;
}
